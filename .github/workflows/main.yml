# Arquivo que define a pipeline de CI-CD

# Define o nome do workflow
name: CI-CD

# Define o evento que deve acountecer para iniciar esta pipeline.
on: 
  # O push define que um commit na branch main irá iniciar esta pipeline.
  push: 
    branches: ["main"]
# Define variáveis de ambiente
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Define as tarefas do workflow
jobs:
  build-and-push:
    # Define o sistema operacional onde o job deve ser executado.
    runs-on: ubuntu-latest
    # ???
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    # Define as etapas do job.
    steps:
      # Adiciona o código em um ambiente virtual
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # Para salvar a imagem em um repositório privado no Github Container Registry é necessário se autenticar através de usuário e senha.
      - name: Log in to the Container registry - Github Container Registry
        uses: docker/login-action@v3
        # Utiliza o github secrets para mascarar o usuário e senha
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extrai metadados desta pipeline e os armazena em memória
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      
      # Criação da imagem docker
      - name: Build and push Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          # Define o diretório que contém o Dockerfile
          context: ./src
          file: ./src/Dockerfile
          push: true
          # Define o nome da imagem a ser criada
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    # Define que o deploy só será executado depois do build e push da imagem ter finalizado.
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Login no GHCR dentro da VM
            echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Stop e Remove do container antigo (se existir)
            podman stop Monolito || true
            podman rm Monolito || true
            
            # Pull da nova imagem
            podman pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
            
            # Rodar o novo container
            podman run -d \
              --name Monolito \
              -p 8000:8000 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
